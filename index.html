// ─── AI CALL ─────────────────────────────────────
async function callAI(prov,key,b64){
  const scanPrompt=`Analiza esta imagen de factura/recibo colombiano. Responde SOLO con JSON válido sin markdown.
Categorías: alimentacion, mercado, transporte, servicios, salud, vivienda, ropa, tecnologia, entretenimiento, deudas, mascotas, colegio, deporte, vehiculo, otros.
JSON requerido: {"description":"nombre del lugar/servicio","amount":NUMERO_ENTERO_SIN_PUNTOS,"category":"categoria","date":"${tod()}","notes":""}
Si no lees el monto pon 0. Solo JSON, sin texto extra.`;

  // ── GROQ (gratis, sin tarjeta) ───────────────────
  if(prov==="groq"&&key){
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({
        model:"meta-llama/llama-4-scout-17b-16e-instruct",
        max_tokens:500,
        messages:[{role:"user",content:[
          {type:"image_url",image_url:{url:"data:image/jpeg;base64,"+b64}},
          {type:"text",text:scanPrompt}
        ]}]
      })
    });
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    const txt=(d.choices?.[0]?.message?.content||"").replace(/```json|```/g,"").trim();
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match) throw new Error("Respuesta inválida de Groq");
    return JSON.parse(match[0]);
  }

  // ── GEMINI (gratis con API key) ──────────────────
  if(prov==="gemini"&&key){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:"image/jpeg",data:b64}},{text:scanPrompt}]}],generationConfig:{temperature:0,maxOutputTokens:500}})
    });
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    const txt=(d.candidates?.[0]?.content?.parts?.[0]?.text||"").replace(/```json|```/g,"").trim();
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match) throw new Error("Respuesta inválida de Gemini");
    return JSON.parse(match[0]);
  }

  // ── CLAUDE ───────────────────────────────────────
  if(prov==="claude"&&key){
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json","x-api-key":key},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:scanPrompt}]}]})
    });
    const d=await r.json();
    return JSON.parse((d.content?.find(x=>x.type==="text")?.text||"").replace(/```json|```/g,"").trim());
  }

  // ── OPENAI ───────────────────────────────────────
  if(prov==="openai"&&key){
    const r=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:"gpt-4o-mini",max_tokens:300,messages:[{role:"user",content:[{type:"image_url",image_url:{url:"data:image/jpeg;base64,"+b64}},{type:"text",text:scanPrompt}]}]})
    });
    const d=await r.json();
    return JSON.parse((d.choices?.[0]?.message?.content||"").replace(/```json|```/g,"").trim());
  }

  throw new Error("Configura tu API Key en la pestaña Escanear ⚙️");
}

function ScanTab({onSave,showToast,pro}){
  const vidRef=useRef(), canRef=useRef(), fileRef=useRef();
  const[mode,setMode]=useState("opts");
  const[useAI,setUseAI]=useState(true);
  const[prov,setProv]=useState(()=>DB.get("mp_ai")||"groq");
  const[apiKey,setApiKey]=useState(()=>DB.get("mp_k_"+(DB.get("mp_ai")||"groq"))||"");
  const[img,setImg]=useState(null);
  const[scanning,setScanning]=useState(false);
  const[res,setRes]=useState(null);
  const[stream,setStream]=useState(null);
  const[manD,setManD]=useState(""); const[manA,setManA]=useState("");
  const[manC,setManC]=useState("otros"); const[manB,setManB]=useState("efectivo");
  const[manDt,setManDt]=useState(tod());
  const[showSub,setShowSub]=useState(false);

  const saveP=p=>{setProv(p);DB.set("mp_ai",p);setApiKey(DB.get("mp_k_"+p)||"");};
  const saveK=k=>{const clean=k.replace(/[^\x20-\x7E]/g,"").trim();setApiKey(clean);DB.set("mp_k_"+prov,clean);};

  const startCam=async()=>{
    if(!pro){setShowSub(true);return;}
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1920},height:{ideal:1080},focusMode:{ideal:"continuous"}},audio:false});
      setStream(s); setMode("cam");
      setTimeout(()=>{if(vidRef.current){vidRef.current.srcObject=s;vidRef.current.play();}},80);
    }catch(e){showToast("❌ Sin acceso a cámara","err");}
  };
  const stopCam=()=>{if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);};
  const capture=()=>{
    const v=vidRef.current, c=canRef.current;
    if(!v||!c)return;
    c.width=v.videoWidth||1280; c.height=v.videoHeight||720;
    c.getContext("2d").drawImage(v,0,0);
    const d=c.toDataURL("image/jpeg",.85).split(",")[1];
    setImg(d); stopCam();
    if(useAI){setMode("res");setScanning(true);setTimeout(()=>analyzeImg(d,prov,apiKey),100);}else setMode("man");
  };
  const fromFile=f=>{
    if(!f)return;
    if(!pro){setShowSub(true);return;}
    const r=new FileReader();

    r.readAsDataURL(f);
  };
  const analyzeImg=async(image,provider,key)=>{
    const k=(key||apiKey||DB.get("mp_k_"+(provider||prov))||"").replace(/[^\x20-\x7E]/g,"").trim();

      setRes({...r,bank:"efectivo"});

      const msg=e.message||"Error desconocido";

    setScanning(false);

// ─── AI ADVISOR ──────────────────────────────────
function AIAdvisor({txs,tInc,tExp,month,apiKey}){
  const[advice,setAdvice]=useState(null);
  const[loading,setLoading]=useState(false);
  const[open,setOpen]=useState(false);

  const getAdvice=async()=>{
    const k=(apiKey||DB.get("mp_k_"+(DB.get("mp_ai")||"groq"))||"").replace(/[^\x20-\x7E]/g,"").trim();
    if(!k){alert("Necesitas configurar tu API Key de Gemini en la pestaña Escanear");return;}
    setLoading(true);setOpen(true);
    const saldo=tInc-tExp;
    const cats=["alimentacion","mercado","transporte","servicios","salud","vivienda","ropa","tecnologia","entretenimiento","deudas","mascotas","otros"];
    const resumen=cats.map(c=>({cat:c,total:txs.filter(x=>x.type==="expense"&&x.category===c).reduce((s,x)=>s+x.amount,0)})).filter(x=>x.total>0);
    const prompt=`Eres un asesor financiero colombiano experto. Analiza estas finanzas del mes:
- Ingresos: $${tInc.toLocaleString("es-CO")} COP
- Gastos: $${tExp.toLocaleString("es-CO")} COP  
- Saldo: $${saldo.toLocaleString("es-CO")} COP
- Gastos por categoría: ${resumen.map(r=>r.cat+": $"+r.total.toLocaleString("es-CO")).join(", ")}

Da 3-4 consejos CONCRETOS y PRÁCTICOS en español colombiano. Sé directo y útil. Menciona si hay categorías donde gasta demasiado. Si el saldo es negativo, di cómo mejorar. Máximo 200 palabras. Usa emojis para hacerlo visual.`;
    try{
      const aiProvAdv=DB.get("mp_ai")||"groq";
      let adviceText="No se pudo obtener consejo";
      if(aiProvAdv==="groq"&&k){
        const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},
          body:JSON.stringify({model:"meta-llama/llama-4-scout-17b-16e-instruct",max_tokens:400,temperature:0.7,messages:[{role:"user",content:prompt}]})
        });
        const d=await r.json();
        if(!d.error) adviceText=d.choices?.[0]?.message?.content||adviceText;
      } else if(k){
        const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:400}})
        });
        const d=await r.json();
        if(!d.error) adviceText=d.candidates?.[0]?.content?.parts?.[0]?.text||adviceText;
      }
      setAdvice(adviceText);
    }catch(e){setAdvice("❌ Error: "+e.message);}
    setLoading(false);
  };

  return(
    <div style={{background:"linear-gradient(135deg,rgba(0,210,255,0.08),rgba(123,47,247,0.08))",border:"1px solid rgba(0,210,255,0.2)",borderRadius:14,padding:"13px 15px",marginBottom:12}}>

// ─── NOTIF SCHEDULER ─────────────────────────────
function scheduleEventNotif(ev){
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  const dt=new Date(ev.date+"T"+ev.time);
  const now=Date.now();
  const t2h=dt.getTime()-2*60*60*1000-now;
  const t15=dt.getTime()-15*60*1000-now;
  if(t2h>0) setTimeout(()=>{try{new Notification("📅 En 2 horas · Mi Plata",{body:ev.title,tag:"ev2h"+ev.id});}catch(e){}},t2h);
  if(t15>0) setTimeout(()=>{try{new Notification("⏰ En 15 min · Mi Plata",{body:ev.title,tag:"ev15"+ev.id});}catch(e){}},t15);
}

// ─── AGENDA TAB ───────────────────────────────────
function AgendaTab({events,onAdd,onDel,onUpd,showToast,apiKey}){
  const[view,setView]=useState("month"); // month|week|day|list
  const[selDate,setSelDate]=useState(tod());
  const[showForm,setShowForm]=useState(false);
  const[aiText,setAiText]=useState("");
  const[aiLoading,setAiLoading]=useState(false);
  const[listening,setListening]=useState(false);
  const[form,setForm]=useState({title:"",date:tod(),time:"08:00",notes:""});

  const curMonth=selDate.slice(0,7);
  const mDays=useMemo(()=>{
    const[y,mo]=curMonth.split("-").map(Number);
    const dim=new Date(y,mo,0).getDate();
    const first=new Date(y,mo-1,1).getDay();
    return{dim,first};
  },[curMonth]);

  const evOnDay=d=>events.filter(e=>e.date===d);
  const mLbl=m=>{const[y,mo]=m.split("-");const ns=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];return ns[Number(mo)-1]+" "+y;};
  const pM=m=>{const[y,mo]=m.split("-").map(Number);const d=new Date(y,mo-2,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};
  const nM=m=>{const[y,mo]=m.split("-").map(Number);const d=new Date(y,mo,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};

  const saveEvent=()=>{
    if(!form.title||!form.date||!form.time){showToast("❌ Completa los campos","err");return;}
    onAdd(form); setForm({title:"",date:tod(),time:"08:00",notes:""}); setShowForm(false);
  };

  const parseAI=async()=>{
    if(!aiText.trim()) return;
    const k=(apiKey||DB.get("mp_k_"+(DB.get("mp_ai")||"groq"))||"").replace(/[^\x20-\x7E]/g,"").trim();
    // k is optional now - Puter works without key
    setAiLoading(true);
    const today=tod();
    const prompt=`Hoy es ${today}. El usuario dice: "${aiText}". Extrae la actividad, fecha (YYYY-MM-DD) y hora (HH:MM en 24h) para agendar. Si falta info, infiere lo mejor posible. Responde SOLO JSON: {"title":"actividad","date":"YYYY-MM-DD","time":"HH:MM","notes":""}. Sin markdown.`;
    try{
      const aiProv2=DB.get("mp_ai")||"groq";
      let ev=null, txt2="";
      if(aiProv2==="groq"&&k){
        const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},
          body:JSON.stringify({model:"meta-llama/llama-4-scout-17b-16e-instruct",max_tokens:200,temperature:0,messages:[{role:"user",content:prompt}]})
        });
        const d=await r.json();
        if(d.error) throw new Error(d.error.message);
        txt2=(d.choices?.[0]?.message?.content||"").replace(/```json|```/g,"").trim();
      } else if(k){
        const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0,maxOutputTokens:200}})
        });
        const d=await r.json();
        if(d.error) throw new Error(d.error.message);
        txt2=(d.candidates?.[0]?.content?.parts?.[0]?.text||"").replace(/```json|```/g,"").trim();
      }
      if(!txt2) throw new Error("⚙️ Configura tu API Key en la pestaña Escanear");
      const match2=txt2.match(/\{[\s\S]*\}/);
      if(match2) ev=JSON.parse(match2[0]);
      if(!ev) throw new Error("No pude interpretar la fecha/hora");
      setForm({title:ev?.title||"",date:ev?.date||tod(),time:ev?.time||"08:00",notes:ev?.notes||""});
      setShowForm(true); setAiText("");
      showToast("✅ ¡Listo! Revisa y confirma");
    }catch(e){showToast("❌ "+e.message,"err");}
    setAiLoading(false);
  };

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("❌ Voz no disponible","err");return;}
    const r=new SR(); r.lang="es-CO"; r.interimResults=false;
    r.onstart=()=>setListening(true);
    r.onend=()=>setListening(false);
    r.onresult=e=>{const t=e.results[0][0].transcript;setAiText(t);};
    r.start();
  };

  const upcomingEvents=[...events].filter(e=>e.date>=tod()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

  return(
    <div style={{padding:"16px 14px 120px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{margin:0,fontSize:19,fontWeight:900}}>📅 Agenda</h2>
        <button onClick={()=>setShowForm(true)} style={{background:"linear-gradient(135deg,#00d2ff,#7b2ff7)",border:"none",borderRadius:11,color:"#fff",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:800,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>
          <IC n="plus" s={14}/>Agendar
        </button>
      </div>

      {/* AI input */}
      <div style={{background:"linear-gradient(135deg,rgba(123,47,247,0.1),rgba(0,210,255,0.1))",border:"1px solid rgba(123,47,247,0.25)",borderRadius:14,padding:"12px",marginBottom:14}}>
        <div style={{fontSize:12,color:"#aaa",marginBottom:8,fontWeight:700}}>🤖 Agenda con IA — escribe o habla</div>
        <div style={{display:"flex",gap:7}}>
          <input value={aiText} onChange={e=>setAiText(e.target.value)} placeholder='Ej: "reunión mañana a las 3pm"' onKeyDown={e=>e.key==="Enter"&&parseAI()}
            style={{flex:1,background:"#0c0c18",border:"1px solid #1a1a2e",borderRadius:10,padding:"10px 12px",color:"#e8e8f4",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={startVoice} style={{background:listening?"rgba(231,76,60,0.2)":"#1a1a2e",border:listening?"1px solid #e74c3c":"1px solid #2a2a4e",borderRadius:10,color:listening?"#e74c3c":"#888",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <IC n="mic" s={16} c={listening?"#e74c3c":"#888"}/>
          </button>
          <button onClick={parseAI} disabled={aiLoading||!aiText} style={{background:"linear-gradient(135deg,#7b2ff7,#00d2ff)",border:"none",borderRadius:10,color:"#fff",width:40,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:aiLoading||!aiText?0.5:1}}>
            {aiLoading?<div style={{width:14,height:14,border:"2px solid #fff3",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>:<IC n="send" s={15} c="#fff"/>}
          </button>
        </div>
      </div>

              <input type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}
                style={{background:"#0c0c18",border:"1px solid #1a1a2e",borderRadius:10,padding:"11px 13px",color:"#e8e8f4",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notas (opcional)"
              style={{background:"#0c0c18",border:"1px solid #1a1a2e",borderRadius:10,padding:"11px 13px",color:"#e8e8f4",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={saveEvent} style={{flex:1}}>💾 Guardar</Btn>

            </div>
          </div>
        </div>
      )}

      {/* Calendar */}
      <div style={{background:"#111120",borderRadius:14,padding:"13px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={()=>setSelDate(pM(curMonth)+"-01")} style={{background:"#1a1a2e",border:"none",color:"#ccc",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:16}}>‹</button>
          <span style={{fontWeight:800,fontSize:14,color:"#00d2ff"}}>{mLbl(curMonth)}</span>
          <button onClick={()=>setSelDate(nM(curMonth)+"-01")} style={{background:"#1a1a2e",border:"none",color:"#ccc",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:16}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["D","L","M","M","J","V","S"].map((d,i)=>(
            <div key={i} style={{textAlign:"center",fontSize:10,color:"#555",fontWeight:700,padding:"3px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {(()=>{
            const[y,mo]=curMonth.split("-").map(Number);
            const cells=[];
            for(let i=0;i<mDays.first;i++) cells.push(<div key={"e"+i}/>);
            for(let d=1;d<=mDays.dim;d++){
              const ds=`${curMonth}-${String(d).padStart(2,"0")}`;
              const evs=evOnDay(ds);
              const isToday=ds===tod();
              const isSel=ds===selDate;
              cells.push(
                <div key={d} onClick={()=>setSelDate(ds)}
                  style={{aspectRatio:"1",borderRadius:8,background:isSel?"rgba(0,210,255,0.2)":isToday?"rgba(123,47,247,0.15)":"transparent",border:isSel?"1px solid #00d2ff":isToday?"1px solid rgba(123,47,247,0.4)":"1px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative"}}>
                  <span style={{fontSize:11,fontWeight:isSel||isToday?700:400,color:isSel?"#00d2ff":isToday?"#a87fff":"#ccc"}}>{d}</span>
                  {evs.length>0&&<div style={{position:"absolute",bottom:2,right:2,width:5,height:5,borderRadius:"50%",background:"#00d2ff"}}/>}

      <div style={{marginBottom:10}}>
        <div style={{fontSize:12,color:"#888",fontWeight:700,marginBottom:8}}>
          {selDate===tod()?"Hoy":selDate} — {evOnDay(selDate).length===0?"Sin eventos":""+evOnDay(selDate).length+" evento(s)"}
        </div>
        {evOnDay(selDate).length===0?(
          <div style={{textAlign:"center",padding:"20px",color:"#444",fontSize:13}}>Sin eventos este día</div>
        ):(
          evOnDay(selDate).map(ev=>(

              <div style={{background:"linear-gradient(135deg,#00d2ff,#7b2ff7)",borderRadius:8,padding:"6px 8px",fontSize:12,fontWeight:800,color:"#fff",flexShrink:0,minWidth:44,textAlign:"center"}}>{ev.time}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13}}>{ev.title}</div>
                {ev.notes&&<div style={{fontSize:11,color:"#666",marginTop:2}}>{ev.notes}</div>}
              </div>
              <button onClick={()=>onDel(ev.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#e74c3c",padding:2}}><IC n="trash" s={14}/></button>

      {/* Upcoming */}
      {upcomingEvents.filter(e=>e.date!==selDate).length>0&&(
        <div>

          {upcomingEvents.filter(e=>e.date!==selDate).slice(0,5).map(ev=>(
            <div key={ev.id} style={{background:"#111120",borderRadius:11,padding:"10px 13px",marginBottom:6,display:"flex",alignItems:"center",gap:10,border:"1px solid #1a1a2e"}}>
              <div style={{flexShrink:0,textAlign:"center",minWidth:36}}>
                <div style={{fontSize:10,color:"#888"}}>{ev.date.slice(5)}</div>
                <div style={{fontSize:11,color:"#00d2ff",fontWeight:700}}>{ev.time}</div>

              <button onClick={()=>onDel(ev.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#e74c3c",padding:2}}><IC n="trash" s={13}/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── LUISA CHAT ───────────────────────────────────
function LuisaChat({onClose,txs,bills=[],cajas=[],events,onAddTx,onAddEvent,showToast,apiKey,tInc,tExp,month,aiName="Asistente",onNameChange}){
  const speakText=(text)=>{
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean=text.replace(/[*_#`]/g,"").replace(/ACTION:\{[^}]*\}/g,"").replace(/EVENT:\{[^}]*\}/g,"").trim();
    const u=new SpeechSynthesisUtterance(clean);
    u.lang="es-CO"; u.rate=1.05; u.pitch=1.1;
    const voices=window.speechSynthesis.getVoices();
    const esp=voices.find(v=>v.lang.startsWith("es")&&v.name.toLowerCase().includes("female"))
      ||voices.find(v=>v.lang.startsWith("es"))
      ||voices.find(v=>v.lang.startsWith("es-US"))
      ||voices[0];
    if(esp) u.voice=esp;
    window.speechSynthesis.speak(u);
  };
  const[msgs,setMsgs]=useState(()=>[{role:"ai",text:`¡Hola! Soy ${aiName} 🤖 Tu asistente financiera. Puedo registrar gastos, ingresos, agendar eventos y darte consejos. ¿En qué te ayudo?`}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[listening,setListening]=useState(false);
  const[voiceReply,setVoiceReply]=useState(()=>DB.get("mp_voice_reply")!==false);
  const endRef=useRef();

  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[msgs]);

  const send=async(text)=>{
    const msg=text||input;
    if(!msg.trim()) return;
    setInput("");
    setMsgs(m=>[...m,{role:"user",text:msg}]);
    setLoading(true);
    const k=(apiKey||DB.get("mp_k_"+(DB.get("mp_ai")||"groq"))||"").replace(/[^\x20-\x7E]/g,"").trim();
    // k is optional - Puter.js handles AI for free without API key
    const saldo=tInc-tExp;
    const pendBills=bills.filter(b=>!(b.paidMonths||[]).includes(month));
    const totalPend=pendBills.reduce((s,b)=>s+b.amount,0);
    const cajasInfo=cajas.map(c=>{const te=(c.entries||[]).reduce((s,e)=>s+e.amount,0),tg=(c.withdrawals||[]).reduce((s,w)=>s+w.amount,0);return`${c.name}: disponible $${(te-tg).toLocaleString("es-CO")}`;}).join(", ");
    const context=`Eres ${aiName}, asistente financiera y de agenda en Mi Plata (app colombiana). Hoy es ${tod()}. Estado financiero del mes: Ingresos=$${tInc.toLocaleString("es-CO")}, Gastos=$${tExp.toLocaleString("es-CO")}, Saldo=$${saldo.toLocaleString("es-CO")} COP. Pagos pendientes: ${pendBills.length} por $${totalPend.toLocaleString("es-CO")} (${pendBills.map(b=>b.name).join(", ")||"ninguno"}). Cajas: ${cajasInfo||"ninguna"}. Últimos 5 movimientos: ${txs.slice(0,5).map(t=>(t.type==="income"?"+":"-")+"$"+t.amount.toLocaleString("es-CO")+" ("+t.description+")").join(", ")||"ninguno"}. Próximos eventos: ${events.filter(e=>e.date>=tod()).slice(0,3).map(e=>e.date+" "+e.time+" "+e.title).join(", ")||"ninguno"}. INSTRUCCIONES: Responde siempre en español colombiano. Sé breve y directo. Si el usuario registra un GASTO responde con JSON: ACTION:{"type":"expense","description":"...","amount":NUMERO,"category":"alimentacion|mercado|transporte|servicios|salud|vivienda|ropa|tecnologia|entretenimiento|deudas|mascotas|colegio|deporte|vehiculo|otros","bank":"efectivo","date":"${tod()}"}. Si registra INGRESO: ACTION:{"type":"income","description":"...","amount":NUMERO,"bank":"efectivo","date":"${tod()}"}. Si agenda algo: EVENT:{"title":"...","date":"YYYY-MM-DD","time":"HH:MM","notes":""}. Para ACTION o EVENT primero explica brevemente, luego pon el JSON.`;

    try{
      const history=msgs.slice(-6).map(m=>({role:m.role==="user"?"user":"model",parts:[{text:m.text}]}));
      const aiProv=DB.get("mp_ai")||"groq";
      let reply="Lo siento, no entendí.";

      // ── GROQ ────────────────────────────────────
      if(aiProv==="groq"&&k){
        const groqMsgs=[{role:"system",content:context},...msgs.slice(-6).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text})),{role:"user",content:msg}];
        const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},
          body:JSON.stringify({model:"meta-llama/llama-4-scout-17b-16e-instruct",max_tokens:600,temperature:0.7,messages:groqMsgs})
        });
        const d=await r.json();
        if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
        reply=(d.choices?.[0]?.message?.content||reply).trim();

      // ── GEMINI ──────────────────────────────────
      } else if(aiProv==="gemini"&&k){
        const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({system_instruction:{parts:[{text:context}]},contents:[...history,{role:"user",parts:[{text:msg}]}],generationConfig:{temperature:0.7,maxOutputTokens:600}})
        });
        const d=await r.json();
        if(d.error) throw new Error(d.error.message);
        reply=(d.candidates?.[0]?.content?.parts?.[0]?.text||reply).trim();

      // ── OPENAI ──────────────────────────────────
      } else if(aiProv==="openai"&&k){
        const r=await fetch("https://api.openai.com/v1/chat/completions",{
          method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},
          body:JSON.stringify({model:"gpt-4o-mini",max_tokens:600,temperature:0.7,messages:[{role:"system",content:context},...msgs.slice(-6).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text})),{role:"user",content:msg}]})
        });
        const d=await r.json();
        if(d.error) throw new Error(d.error.message);
        reply=(d.choices?.[0]?.message?.content||reply).trim();

      } else {
        reply="⚙️ Para usar el asistente, ve a la pestaña Escanear, selecciona Groq y pega tu API Key gratuita de console.groq.com — sin tarjeta de crédito.";
      }

      // Parse action
      const actionMatch=reply.match(/ACTION:(\{[\s\S]*?\})/);
      const eventMatch=reply.match(/EVENT:(\{[\s\S]*?\})/);
      let cleanReply=reply.replace(/ACTION:\{[\s\S]*?\}/,"").replace(/EVENT:\{[\s\S]*?\}/,"").trim();

      if(actionMatch){
        try{
          const tx=JSON.parse(actionMatch[1]);
          onAddTx(tx);
          cleanReply+="\n\n✅ ¡Registrado!";
        }catch(e){}
      }
      if(eventMatch){
        try{
          const ev=JSON.parse(eventMatch[1]);
          onAddEvent(ev);
          cleanReply+="\n\n📅 ¡Agendado!";
        }catch(e){}
      }

      setMsgs(m=>[...m,{role:"ai",text:cleanReply}]);
      if(voiceReply) speakText(cleanReply);
    }catch(e){
      setMsgs(m=>[...m,{role:"ai",text:"❌ Error: "+e.message}]);
    }
    setLoading(false);
  };

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("❌ Voz no disponible en este dispositivo","err");return;}
    const r=new SR(); r.lang="es-CO"; r.interimResults=false;
    r.onstart=()=>setListening(true);
    r.onend=()=>setListening(false);
    r.onresult=e=>{const t=e.results[0][0].transcript;send(t);};
    r.start();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:400,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:"#0c0c18",padding:"14px 16px",borderBottom:"1px solid #1a1a2e",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#7b2ff7,#00d2ff)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>🤖</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{fontWeight:900,fontSize:16}}>{aiName}</div>
          <button onClick={()=>{const n=prompt("Nombre del asistente:",aiName);if(n&&n.trim())onNameChange(n.trim());}} style={{background:"none",border:"none",cursor:"pointer",color:"#555",padding:0,fontSize:11}}>✏️</button>
        </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:11,color:"#00d2ff"}}>Asistente IA · siempre disponible</div>
          <button onClick={()=>{const v=!voiceReply;setVoiceReply(v);DB.set("mp_voice_reply",v);window.speechSynthesis?.cancel();}} title={voiceReply?"Voz ON":"Voz OFF"}
            style={{background:voiceReply?"rgba(0,210,255,0.15)":"rgba(255,255,255,0.05)",border:voiceReply?"1px solid rgba(0,210,255,0.4)":"1px solid #2a2a4e",borderRadius:8,color:voiceReply?"#00d2ff":"#555",padding:"3px 8px",cursor:"pointer",fontFamily:"inherit",fontSize:10,fontWeight:700}}>
            {voiceReply?"🔊 Voz":"🔇 Mudo"}
          </button>
        </div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#666",padding:4}}><IC n="x" s={20}/></button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"82%",background:m.role==="user"?"linear-gradient(135deg,#00d2ff,#7b2ff7)":"#111120",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.5,color:"#fff",border:m.role==="ai"?"1px solid #1a1a2e":"none",whiteSpace:"pre-wrap"}}>
              {m.text}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",justifyContent:"flex-start"}}>
            <div style={{background:"#111120",borderRadius:"16px 16px 16px 4px",padding:"12px 16px",border:"1px solid #1a1a2e",display:"flex",gap:5,alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#00d2ff",animation:`bounce 1s ${i*0.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Quick actions */}
      <div style={{padding:"8px 14px 0",display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
        {["💰 ¿Cuánto me queda?","📅 ¿Qué tengo hoy?","📊 Analiza mis gastos","💡 Dame un consejo"].map((q,i)=>(
          <button key={i} onClick={()=>send(q.replace(/^[^ ]+ /,""))} style={{flexShrink:0,background:"#111120",border:"1px solid #1a1a2e",borderRadius:20,color:"#888",padding:"6px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{q}</button>
        ))}
      </div>

      {/* Input */}
      <div style={{padding:"10px 14px 20px",background:"#0c0c18",borderTop:"1px solid #1a1a2e",display:"flex",gap:8,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)} {...{placeholder:`Escribe o habla con ${aiName}...`}} onKeyDown={e=>e.key==="Enter"&&send()}
          style={{flex:1,background:"#111120",border:"1px solid #1a1a2e",borderRadius:12,padding:"11px 14px",color:"#e8e8f4",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
        <button onClick={startVoice} style={{background:listening?"rgba(231,76,60,0.2)":"#111120",border:listening?"1px solid #e74c3c":"1px solid #1a1a2e",borderRadius:12,color:listening?"#e74c3c":"#888",width:44,height:44,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <IC n="mic" s={18} c={listening?"#e74c3c":"#888"}/>
        </button>
        <button onClick={()=>send()} disabled={!input||loading} style={{background:"linear-gradient(135deg,#00d2ff,#7b2ff7)",border:"none",borderRadius:12,color:"#fff",width:44,height:44,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:!input||loading?0.5:1}}>
          <IC n="send" s={17} c="#fff"/>
        </button>
      </div>

      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}

  const[month,setMonth]=useState(curM());
  const[txs,setTxs]=useState(()=>DB.get("mp_tx")||[]);
  const[bills,setBills]=useState(()=>DB.get("mp_bills")||[]);
  const[cajas,setCajas]=useState(()=>DB.get("mp_cajas")||[]);
  const[activeCaja,setActiveCaja]=useState(null);
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);
  const[events,setEvents]=useState(()=>DB.get("mp_events")||[]);
  const[showLuisa,setShowLuisa]=useState(false);
  const[aiName,setAiName]=useState(()=>DB.get("mp_ainame")||"Asistente");
  const[alarms,setAlarms]=useState([]);
  const[dismissed,setDismissed]=useState(()=>DB.get("mp_dis")||[]);
  const[notifOk,setNotifOk]=useState(typeof Notification!=="undefined"&&Notification?.permission==="granted");
  const[showSub,setShowSub]=useState(false);
  const[pro,setPro]=useState(()=>checkPro());
  const[newCN,setNewCN]=useState("");
  const dl=daysLeft();

  useEffect(()=>{
    const check=()=>{
      setPro(checkPro());
      const now=new Date(), d=now.getDate(), m=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
      const active=bills.filter(b=>{ const k=b.id+"-"+m; return b.dueDay===d&&!dismissed.includes(k); });
      setAlarms(active);
      if(typeof Notification!=="undefined"&&Notification?.permission==="granted") active.forEach(b=>{ try{ new Notification("💸 Vence HOY · Mi Plata",{body:`${b.name} · ${fmt(b.amount)}`,tag:"b"+b.id}); }catch(e){} });
    };
    check(); const iv=setInterval(check,60000); return()=>clearInterval(iv);
  },[bills,dismissed]);

  const askNotif=async()=>{ if(!("Notification"in window))return; const p=await Notification.requestPermission(); setNotifOk(p==="granted"); };
  const showT=(msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),2600); };

  const saveTxs=d=>{setTxs(d);DB.set("mp_tx",d);};
  const saveBills=d=>{setBills(d);DB.set("mp_bills",d);};
  const saveCajas=d=>{setCajas(d);DB.set("mp_cajas",d);};

  const addTx=tx=>{saveTxs([{...tx,id:Date.now()},...txs]);showT(tx.type==="income"?"💰 Ingreso guardado":"📝 Gasto guardado");setModal(null);};
  const updTx=tx=>{saveTxs(txs.map(t=>t.id===tx.id?tx:t));showT("✅ Actualizado");setModal(null);};
  const delTx=id=>{saveTxs(txs.filter(t=>t.id!==id));showT("🗑️ Eliminado","warn");};

  const saveEvents=d=>{setEvents(d);DB.set("mp_events",d);};
  const addEvent=e=>{const ev={...e,id:Date.now()};saveEvents([ev,...events]);showT("📅 Evento agendado");
    // Schedule notifications
    scheduleEventNotif(ev);
  };
  const delEvent=id=>{saveEvents(events.filter(e=>e.id!==id));showT("🗑️ Eliminado","warn");};
  const updEvent=e=>{saveEvents(events.map(x=>x.id===e.id?e:x));showT("✅ Evento actualizado");};

  const addBill=b=>{saveBills([{...b,id:Date.now()},...bills]);showT("🔔 Pago programado");setModal(null);};
  const toggleBill=id=>{saveBills(bills.map(b=>{ if(b.id!==id)return b; const pm=b.paidMonths||[]; return{...b,paidMonths:pm.includes(month)?pm.filter(x=>x!==month):[...pm,month]}; }));};
  const delBill=id=>{saveBills(bills.filter(b=>b.id!==id));showT("🗑️ Eliminado","warn");};
  const dismissAlarm=b=>{ const k=b.id+"-"+curM(); const d2=[...dismissed,k]; setDismissed(d2); DB.set("mp_dis",d2); setAlarms(a=>a.filter(x=>x.id!==b.id)); };

  const addCaja=n=>{saveCajas([{id:Date.now(),name:n,entries:[],withdrawals:[]},...cajas]);showT(`✅ "${n}" creada`);setModal(null);};
  const delCaja=id=>{saveCajas(cajas.filter(c=>c.id!==id));if(activeCaja===id)setActiveCaja(null);};
  const renameCaja=(id,n)=>{saveCajas(cajas.map(c=>c.id===id?{...c,name:n}:c));showT("✅ Nombre actualizado");setModal(null);};
  const addEntry=(cid,e)=>{saveCajas(cajas.map(c=>c.id!==cid?c:{...c,entries:[{...e,id:Date.now()},...(c.entries||[])]}));showT("💵 Entrega registrada");setModal(null);};
  const addW=(cid,w)=>{saveCajas(cajas.map(c=>c.id!==cid?c:{...c,withdrawals:[{...w,id:Date.now()},...(c.withdrawals||[])]}));showT("📤 Retiro registrado");setModal(null);};
  const delW=(cid,wid)=>{saveCajas(cajas.map(c=>c.id!==cid?c:{...c,withdrawals:c.withdrawals.filter(w=>w.id!==wid)}));};
  const delE=(cid,eid)=>{saveCajas(cajas.map(c=>c.id!==cid?c:{...c,entries:c.entries.filter(e=>e.id!==eid)}));};

  const openCaja=cajas.find(c=>c.id===activeCaja);
  const cStats=c=>{ const te=(c.entries||[]).reduce((s,e)=>s+e.amount,0),tg=(c.withdrawals||[]).reduce((s,w)=>s+w.amount,0); return{te,tg,disp:te-tg,mG:(c.withdrawals||[]).filter(w=>w.date?.startsWith(month)).reduce((s,w)=>s+w.amount,0)}; };

  const mTx=txs.filter(t=>t.date?.startsWith(month));
  const tInc=mTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const tExp=mTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const pend=bills.filter(b=>!(b.paidMonths||[]).includes(month));
  const byAct=ACTS.map(a=>({name:a,total:mTx.filter(x=>x.type==="income"&&x.activity===a).reduce((s,x)=>s+x.amount,0)})).filter(a=>a.total>0);
  const byBank=BANKS.map(b=>({...b,total:mTx.filter(x=>x.type==="income"&&x.bank===b.id).reduce((s,x)=>s+x.amount,0)})).filter(b=>b.total>0);

  const TABS=[
    {id:"dashboard",icon:"chart",label:"Resumen"},
    {id:"transactions",icon:"list",label:"Movimientos"},
    {id:"agenda",icon:"calendar",label:"Agenda"},
    {id:"cajas",icon:"box",label:"Cajas"},
    {id:"bills",icon:"bell",label:"Pagos"},
    {id:"scan",icon:"camera",label:"Escanear"},
    {id:"feedback",icon:"star",label:"Beta 🟢"},
  ];

  return(
    <div style={{background:"#080810",minHeight:"100vh",color:"#e8e8f4",fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",maxWidth:480,margin:"0 auto"}}>

      {showSub&&<SubScreen onClose={()=>setShowSub(false)} onDone={()=>{setPro(checkPro());setShowSub(false);}}/>}

      {/* HEADER */}
      <div style={{padding:"13px 16px 11px",borderBottom:"1px solid #1a1a2e",background:"#0c0c18",position:"sticky",top:0,zIndex:50}}>
        {activeCaja&&openCaja?(
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setActiveCaja(null)} style={{background:"#1a1a2e",border:"none",color:"#ccc",width:34,height:34,borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n="back" s={18}/></button>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:17}}>{openCaja.name}</div><div style={{fontSize:11,color:"#555"}}>Caja de control</div></div>
            <button onClick={()=>setModal({type:"renameCaja",data:openCaja})} style={{background:"none",border:"none",cursor:"pointer",color:"#666",padding:4}}><IC n="edit" s={16}/></button>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:24,fontWeight:900,background:"linear-gradient(135deg,#00d2ff,#7b2ff7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>₱</div>
            <div style={{flex:1}}><div style={{fontWeight:900,fontSize:18,letterSpacing:"-0.5px"}}>Mi Plata</div><div style={{fontSize:10,color:"#555"}}>Control financiero</div></div>
            {pro
              ?<span style={{background:"rgba(0,210,255,0.1)",border:"1px solid rgba(0,210,255,0.2)",borderRadius:8,color:"#00d2ff",padding:"3px 9px",fontSize:11,fontWeight:700}}>PRO ✓</span>
              :<button onClick={()=>setShowSub(true)} style={{background:"rgba(231,76,60,0.12)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:8,color:"#e74c3c",padding:"3px 9px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>⏳{dl}d</button>
            }
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <button onClick={()=>setMonth(pM(month))} style={{background:"#1a1a2e",border:"none",color:"#ccc",width:26,height:26,borderRadius:7,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
              <span style={{fontSize:11,fontWeight:700,minWidth:58,textAlign:"center"}}>{mLbl(month)}</span>
              <button onClick={()=>setMonth(nM(month))} style={{background:"#1a1a2e",border:"none",color:"#ccc",width:26,height:26,borderRadius:7,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
            </div>
          </div>
        )}
      </div>

      {/* TABS */}
      {!activeCaja&&(
        <div style={{display:"flex",background:"#0c0c18",borderBottom:"1px solid #1a1a2e",overflowX:"auto"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"0 0 auto",minWidth:52,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 4px",background:"none",border:"none",borderBottom:tab===t.id?"2px solid #00d2ff":"2px solid transparent",color:tab===t.id?"#00d2ff":"#444",fontSize:9,cursor:"pointer",fontFamily:"inherit",position:"relative",whiteSpace:"nowrap"}}>
              <IC n={t.icon} s={15}/>
              <span>{t.label}</span>
              {t.id==="bills"&&alarms.length>0&&<span style={{position:"absolute",top:5,right:"8%",width:7,height:7,borderRadius:"50%",background:"#e74c3c"}}/>}
            </button>
          ))}
        </div>
      )}

      {/* CONTENT */}
      {activeCaja&&openCaja?(
        <CajaDetail caja={openCaja} month={month} onAddE={e=>addEntry(openCaja.id,e)} onAddW={w=>addW(openCaja.id,w)} onDelE={eid=>delE(openCaja.id,eid)} onDelW={wid=>delW(openCaja.id,wid)} onDelete={()=>delCaja(openCaja.id)} setModal={setModal}/>
      ):(
        <div style={{padding:"15px 14px 100px"}}>

          {/* DASHBOARD */}
          {tab==="dashboard"&&(
            <div>
              {alarms.length>0&&(
                <div style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.3)",borderRadius:14,padding:"12px 14px",marginBottom:14}}>
                  <div style={{fontWeight:800,fontSize:13,color:"#e74c3c",marginBottom:8}}>🔔 Pagos que vencen HOY</div>
                  {alarms.map(b=>(
                    <div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div><div style={{fontSize:13,fontWeight:600}}>{b.name}</div><div style={{fontSize:11,color:"#e74c3c",fontWeight:700}}>{fmt(b.amount)}</div></div>
                      <button onClick={()=>dismissAlarm(b)} style={{background:"rgba(231,76,60,0.15)",border:"1px solid rgba(231,76,60,0.3)",borderRadius:8,color:"#e74c3c",padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:4}}><IC n="mute" s={13}/>Silenciar</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:14}}>
                <Card label="Ingresos" value={fmt(tInc)} color="#2ecc71" icon="up"/>
                <Card label="Gastos" value={fmt(tExp)} color="#e74c3c" icon="down"/>
                <Card label="Saldo" value={fmt(tInc-tExp)} color={tInc-tExp>=0?"#4f8ef7":"#e74c3c"} icon="wallet"/>
              </div>
              <div style={{display:"flex",gap:9,marginBottom:14}}>
                <button onClick={()=>setTab("scan")} style={{flex:2,background:"linear-gradient(135deg,#00d2ff,#7b2ff7)",border:"none",borderRadius:13,color:"#fff",padding:"13px",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <IC n="camera" s={18}/>📸 Escanear factura
                </button>
                <button onClick={()=>setModal({type:"addTx",data:{type:"expense"}})} style={{flex:1,background:"#111120",border:"1px solid #1a1a2e",borderRadius:13,color:"#ccc",padding:"13px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}>
                  ➕ Gasto
                </button>
              </div>
              {pend.length>0&&(
                <div onClick={()=>setTab("bills")} style={{background:"rgba(231,76,60,0.08)",border:"1px solid rgba(231,76,60,0.2)",borderRadius:10,padding:"9px 13px",display:"flex",gap:8,alignItems:"center",marginBottom:12,fontSize:13,color:"#e74c3c",cursor:"pointer"}}>
                  <IC n="bell" s={14}/><span><strong>{pend.length} pagos pendientes</strong> · {fmt(pend.reduce((s,b)=>s+b.amount,0))}</span>
                </div>
              )}
              {byBank.length>0&&(
                <div style={{background:"#111120",borderRadius:14,padding:"13px 15px",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:9}}>💳 Ingresos por banco</div>
                  {byBank.map(b=>(
                    <div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #1a1a2e"}}>
                      <BankBadge id={b.id}/><span style={{fontWeight:700,color:"#2ecc71",fontSize:13}}>{fmt(b.total)}</span>
                    </div>
                  ))}
                </div>
              )}
              {byAct.length>0&&(
                <div style={{background:"#111120",borderRadius:14,padding:"13px 15px",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:9}}>💼 Ingresos por actividad</div>
                  {byAct.map((a,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #1a1a2e"}}>
                      <span style={{fontSize:13}}>{a.name}</span><span style={{fontWeight:700,color:"#2ecc71",fontSize:13}}>{fmt(a.total)}</span>
                    </div>
                  ))}
                </div>
              )}
              {cajas.length>0&&(
                <div style={{background:"#111120",borderRadius:14,padding:"13px 15px",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:9}}>📦 Cajas</div>
                  {cajas.map(c=>{ const s=cStats(c); return(
                    <div key={c.id} onClick={()=>setActiveCaja(c.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1a1a2e",cursor:"pointer"}}>
                      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{c.name}</div><div style={{fontSize:11,color:"#888"}}>Este mes: {fmt(s.mG)}</div></div>
                      <div style={{textAlign:"right"}}><div style={{fontWeight:800,color:s.disp>=0?"#4f8ef7":"#e74c3c",fontSize:14}}>{fmt(s.disp)}</div><div style={{fontSize:10,color:"#888"}}>disponible</div></div>
                      <IC n="arrow" s={14} c="#555"/>
                    </div>
                  ); })}
                </div>
              )}
              {tExp>0&&(
                <div style={{background:"#111120",borderRadius:14,padding:"13px 15px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:9}}>📊 Gastos por categoría</div>
                  {CATS.map(c=>{ const t=mTx.filter(x=>x.type==="expense"&&x.category===c.id).reduce((s,x)=>s+x.amount,0); if(!t)return null; return(
                    <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{display:"flex",gap:7,alignItems:"center"}}><span style={{width:8,height:8,borderRadius:"50%",background:c.color,display:"inline-block"}}/><span style={{fontSize:13}}>{c.label}</span></div>
                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <div style={{width:60,height:4,background:"#1a1a2e",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:c.color,width:`${Math.min(100,(t/tExp)*100)}%`}}/></div>
                        <span style={{fontSize:12,fontWeight:700,minWidth:80,textAlign:"right"}}>{fmt(t)}</span>
                      </div>
                    </div>
                  ); })}
                </div>
              )}
              {mTx.length===0&&cajas.length===0&&(
                <div style={{textAlign:"center",padding:"50px 0",color:"#444"}}>
                  <div style={{fontSize:48,marginBottom:12}}>📊</div>
                  <p>Sin movimientos en {mLbl(month)}</p>
                  <Btn onClick={()=>{setTab("transactions");setModal({type:"tx"});}} style={{width:"auto",padding:"12px 24px",display:"inline-block"}}>+ Primer movimiento</Btn>
                </div>
              )}
            </div>
          )}

          {/* TRANSACTIONS */}
          {tab==="transactions"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <h2 style={{margin:0,fontSize:19,fontWeight:900}}>Movimientos</h2>
                <button onClick={()=>setModal({type:"tx"})} style={{background:"linear-gradient(135deg,#00d2ff,#7b2ff7)",border:"none",borderRadius:11,color:"#fff",padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:800,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}><IC n="plus" s={14}/>Agregar</button>
              </div>
              {mTx.length===0?<div style={{textAlign:"center",padding:"50px 0",color:"#444"}}>📭 Sin movimientos</div>:(
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {[...mTx].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(tx=>{
                    const cat=CATS.find(c=>c.id===tx.category);
                    return(
                      <div key={tx.id} style={{background:"#111120",borderRadius:11,padding:"11px 13px",display:"flex",gap:10,alignItems:"flex-start"}}>
                        <div style={{width:9,height:9,borderRadius:"50%",flexShrink:0,marginTop:5,background:tx.type==="income"?"#2ecc71":(cat?.color||"#aaa")}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.description}</div>
                          <div style={{fontSize:11,color:"#555",marginTop:2}}>{tx.type==="income"?`💼 ${tx.activity||"Ingreso"}`:cat?.label} · {tx.date}</div>
                          {tx.bank&&<div style={{marginTop:4}}><BankBadge id={tx.bank}/></div>}
                          {tx.notes&&<div style={{fontSize:11,color:"#777",marginTop:3}}>{tx.notes}</div>}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
                          <span style={{fontWeight:800,fontSize:14,color:tx.type==="income"?"#2ecc71":"#e74c3c"}}>{tx.type==="income"?"+":"-"}{fmt(tx.amount)}</span>
                          <div style={{display:"flex",gap:4}}>
                            <button onClick={()=>setModal({type:"tx",data:tx})} style={{background:"none",border:"none",cursor:"pointer",color:"#555",padding:2}}><IC n="edit" s={13}/></button>
                            <button onClick={()=>delTx(tx.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#e74c3c",padding:2}}><IC n="trash" s={13}/></button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* CAJAS */}
          {tab==="cajas"&&(
            <div>
              <h2 style={{margin:"0 0 6px",fontSize:19,fontWeight:900}}>Mis Cajas</h2>
              <p style={{color:"#777",fontSize:13,marginBottom:14}}>Controla plata que recibes como préstamo o anticipo.</p>
              <div style={{background:"#111120",borderRadius:13,padding:"12px",marginBottom:14,display:"flex",gap:8}}>
                <input value={newCN} onChange={e=>setNewCN(e.target.value)}
                  placeholder='Nueva caja: "Anticipo", "Nómina"...'
                  onKeyDown={e=>e.key==="Enter"&&newCN&&(addCaja(newCN),setNewCN(""))}
                  style={{flex:1,background:"#0c0c18",border:"1px solid #1a1a2e",borderRadius:9,padding:"9px 11px",color:"#e8e8f4",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                <button onClick={()=>{if(newCN){addCaja(newCN);setNewCN("");}}} style={{background:"linear-gradient(135deg,#00d2ff,#7b2ff7)",border:"none",borderRadius:9,color:"#fff",padding:"9px 14px",cursor:"pointer",fontWeight:800,fontFamily:"inherit",fontSize:14}}>+</button>
              </div>
              {cajas.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#444"}}>📦 No tienes cajas</div>:(
                <div style={{display:"flex",flexDirection:"column",gap:11}}>
                  {cajas.map(c=>{ const s=cStats(c); return(
                    <div key={c.id} onClick={()=>setActiveCaja(c.id)} style={{background:"#111120",borderRadius:15,padding:"15px",cursor:"pointer",border:"1px solid #1a1a2e"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:11}}>
                        <div><div style={{fontWeight:800,fontSize:16}}>{c.name}</div><div style={{fontSize:12,color:"#888"}}>{(c.entries||[]).length} entregas · {(c.withdrawals||[]).length} retiros</div></div>
                        <IC n="arrow" s={16} c="#555"/>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:9}}>
                        <div><div style={{fontSize:10,color:"#888"}}>Recibido</div><div style={{fontWeight:700,color:"#2ecc71",fontSize:13}}>{fmt(s.te)}</div></div>
                        <div><div style={{fontSize:10,color:"#888"}}>Gastado</div><div style={{fontWeight:700,color:"#e74c3c",fontSize:13}}>{fmt(s.tg)}</div></div>
                        <div><div style={{fontSize:10,color:"#888"}}>Disponible</div><div style={{fontWeight:800,color:s.disp>=0?"#4f8ef7":"#e74c3c",fontSize:15}}>{fmt(s.disp)}</div></div>
                      </div>
                      <div style={{fontSize:12,color:"#888"}}>Este mes: <strong style={{color:"#e74c3c"}}>{fmt(s.mG)}</strong></div>
                    </div>
                  ); })}
                </div>
              )}
            </div>
          )}

          {/* BILLS */}
          {tab==="bills"&&(
            <BillsTab
              bills={bills} month={month} alarms={alarms} notifOk={notifOk}
              askNotif={askNotif} pend={pend}
              onNew={()=>setModal({type:"bill"})}
              onToggle={toggleBill} onDel={delBill} onDismiss={dismissAlarm}
              onPayWithScan={(bill)=>{setModal({type:"payBill",data:bill});}}
              onPayManual={(bill,amount)=>{
                addTx({type:"expense",description:"Pago: "+bill.name,amount:amount||bill.amount,category:bill.category||"servicios",bank:"efectivo",date:tod(),notes:"Pago programado"});
                toggleBill(bill.id);
              }}
              txs={txs}
            />
          )}

          {tab==="agenda"&&<AgendaTab events={events} onAdd={addEvent} onDel={delEvent} onUpd={updEvent} showToast={showT} apiKey={DB.get("mp_k_"+(DB.get("mp_ai")||"groq"))||""} />}
          {tab==="scan"&&<ScanTab onSave={tx=>{addTx(tx);setTab("transactions");}} showToast={showT} pro={pro}/>}
          {tab==="feedback"&&<FeedbackTab/>}
        </div>
      )}

      {/* MODALS */}
      {modal?.type==="tx"&&<Modal title={modal.data?.id?"Editar movimiento":"Nuevo movimiento"} onClose={()=>setModal(null)}><TxForm initial={modal.data} onSave={modal.data?.id?updTx:addTx}/></Modal>}
      {modal?.type==="bill"&&<Modal title="Nuevo pago fijo" onClose={()=>setModal(null)}><BillForm onSave={addBill}/></Modal>}
      {modal?.type==="payBill"&&<Modal title={"Pagar: "+modal.data?.name} onClose={()=>setModal(null)}>
        <PayBillForm bill={modal.data} onPayManual={(bill,amt)=>{
          addTx({type:"expense",description:"Pago: "+bill.name,amount:amt||bill.amount,category:bill.category||"servicios",bank:"efectivo",date:tod(),notes:"Pago programado"});
          toggleBill(bill.id); setModal(null); showT("✅ Pago registrado");
        }} onPayScan={(bill)=>{setModal(null); setTab("scan");}} />
      </Modal>}
      {modal?.type==="renameCaja"&&<Modal title="Cambiar nombre" onClose={()=>setModal(null)}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <Inp placeholder="Nuevo nombre" value={modal.data.name} onChange={e=>setModal(m=>({...m,data:{...m.data,name:e.target.value}}))}/>
          <Btn onClick={()=>renameCaja(modal.data.id,modal.data.name)}>Guardar nombre</Btn>
        </div>
      </Modal>}
      {modal?.type==="entry"&&<Modal title="Registrar entrega" onClose={()=>setModal(null)}>
        {(()=>{ const[a,setA]=useState(""),[n,setN]=useState(""),[d,setD]=useState(tod());
          return(<div style={{display:"flex",flexDirection:"column",gap:11}}>
            <Inp placeholder="Monto recibido *" type="number" value={a} onChange={e=>setA(e.target.value)}/>
            <Inp placeholder="¿Quién entregó / motivo?" value={n} onChange={e=>setN(e.target.value)}/>
            <Inp type="date" value={d} onChange={e=>setD(e.target.value)}/>
            <Btn onClick={()=>{if(a)addEntry(modal.cid,{amount:Number(a),notes:n,date:d});}}>💵 Guardar entrega</Btn>
          </div>); })()
        }
      </Modal>}
      {modal?.type==="withdrawal"&&<Modal title="Registrar retiro" onClose={()=>setModal(null)}>
        {(()=>{ const[n,setN]=useState(""),[a,setA]=useState(""),[d,setD]=useState(tod());
          return(<div style={{display:"flex",flexDirection:"column",gap:11}}>
            <Inp placeholder="¿Qué compraste? *" value={n} onChange={e=>setN(e.target.value)}/>
            <Inp placeholder="Monto *" type="number" value={a} onChange={e=>setA(e.target.value)}/>
            <Inp type="date" value={d} onChange={e=>setD(e.target.value)}/>
            <Btn onClick={()=>{if(n&&a)addW(modal.cid,{name:n,amount:Number(a),date:d});}}>📤 Guardar retiro</Btn>
          </div>); })()
        }
      </Modal>}

      {/* LUISA BUTTON */}
      {!activeCaja&&!showLuisa&&(
        <button onClick={()=>setShowLuisa(true)} style={{position:"fixed",bottom:76,right:16,zIndex:300,background:"linear-gradient(135deg,#7b2ff7,#00d2ff)",border:"none",borderRadius:"50%",width:58,height:58,cursor:"pointer",boxShadow:"0 4px 24px rgba(123,47,247,0.6)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
          <span style={{fontSize:22}}>🤖</span>
        </button>
      )}
      {showLuisa&&<LuisaChat onClose={()=>setShowLuisa(false)} txs={txs} bills={bills} cajas={cajas} events={events} onAddTx={addTx} onAddEvent={addEvent} showToast={showT} apiKey={DB.get("mp_k_"+(DB.get("mp_ai")||"groq"))||""} tInc={tInc} tExp={tExp} month={month} aiName={aiName} onNameChange={n=>{setAiName(n);DB.set("mp_ainame",n);}}/>}

      {toast&&(
        <div style={{position:"fixed",bottom:88,left:"50%",transform:"translateX(-50%)",background:toast.type==="err"?"#c0392b":toast.type==="warn"?"#e67e22":"#111120",color:"#fff",padding:"10px 22px",borderRadius:30,fontSize:13,fontWeight:700,boxShadow:"0 4px 20px rgba(0,0,0,0.6)",zIndex:500,whiteSpace:"nowrap",border:"1px solid rgba(255,255,255,0.1)",pointerEvents:"none"}}>
          {toast.msg}
        </div>
      )}

      <style>{`
        @keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes spin{to{transform:rotate(360deg)}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{margin:0;background:#080810;overscroll-behavior:none;}
        input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);}
        select option{background:#111120;}
        ::-webkit-scrollbar{width:0;}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
